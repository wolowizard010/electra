version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: electra_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: electra_secure_password_2026
      POSTGRES_DB: electra_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
